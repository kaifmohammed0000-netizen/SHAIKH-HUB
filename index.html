<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form</title>
</head>
<body>
    <h1>Product Form</h1>
    <form id="productForm">
        <label for="category">Category:</label>
        <select id="category" name="category">
            <option value="electronics">Electronics</option>
            <option value="clothing">Clothing</option>
            <option value="toys">Toys</option>
        </select>

        <label for="location">Location:</label>
        <input type="text" id="location" name="location">

        <label for="search">Search:</label>
        <input type="text" id="search" name="search" placeholder="Search products...">

        <label for="imageUpload">Image Upload:</label>
        <input type="file" id="imageUpload" name="imageUpload">

        <label for="contactInfo">Contact Information:</label>
        <input type="text" id="contactInfo" name="contactInfo" placeholder="Your contact info">

        <button type="submit">Submit</button>
    </form>

    <h2>Products Display</h2>
    <div id="productsDisplay">
        <div class="product" data-category="electronics">
            <p>Electronics Product 1</p>
        </div>
        <div class="product" data-category="clothing">
            <p>Clothing Product 1</p>
        </div>
        <div class="product" data-category="toys">
            <p>Toy Product 1</p>
        </div>
        <!-- Products will be filtered based on category and search functionality -->
    </div>

    <script>
        // JavaScript for filtering products
        const searchInput = document.getElementById('search');
        const products = document.querySelectorAll('.product');

        searchInput.addEventListener('input', function() {
            const searchValue = searchInput.value.toLowerCase();
            products.forEach(product => {
                const productText = product.innerText.toLowerCase();
                product.style.display = productText.includes(searchValue) ? '' : 'none';
            });
        });

        // Additional filtering logic for categories can be added here
    </script>
</body>
</html>
